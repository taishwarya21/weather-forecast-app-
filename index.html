<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>

  <div class="container">

    <!-- HEADER -->
    <h1>🌤️ Weather App</h1>

    <!-- SEARCH BOX -->
    <div class="search-box">
      <input type="text" id="city-input" placeholder="Enter city name..." />
      <button id="search-btn">
        <i class="fas fa-search"></i>
      </button>
    </div>

    <!-- ERROR MESSAGE -->
    <p class="error hidden" id="error-msg">
      ❌ City not found. Please try again.
    </p>

    <!-- WEATHER CARD -->
    <div class="weather-card hidden" id="weather-card">

      <!-- Location and Date -->
      <div class="location">
        <h2 id="city-name">London</h2>
        <p id="date">Monday, 1 Jan</p>
      </div>

      <!-- Weather Icon and Temp -->
      <div class="weather-main">
        <img id="weather-icon" src="" alt="weather icon"/>
        <div>
          <h1 id="temperature">25°C</h1>
          <p id="description">Clear Sky</p>
        </div>
      </div>

      <!-- Weather Details -->
      <div class="weather-details">
        <div class="detail">
          <i class="fas fa-droplet"></i>
          <p id="humidity">60%</p>
          <span>Humidity</span>
        </div>
        <div class="detail">
          <i class="fas fa-wind"></i>
          <p id="wind-speed">12 km/h</p>
          <span>Wind Speed</span>
        </div>
        <div class="detail">
          <i class="fas fa-eye"></i>
          <p id="visibility">10 km</p>
          <span>Visibility</span>
        </div>
        <div class="detail">
          <i class="fas fa-gauge"></i>
          <p id="pressure">1012 hPa</p>
          <span>Pressure</span>
        </div>
      </div>

    </div>

    <!-- LOADING -->
    <div class="loading hidden" id="loading">
      <i class="fas fa-spinner fa-spin"></i>
      <p>Fetching weather...</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
